name: Nix CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  NIXPKGS_ALLOW_UNFREE: '1'
  ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
  PUPPETEER_SKIP_DOWNLOAD: '1'

jobs:
  prepare-linux:
    name: Prepare Linux matrix
    runs-on: ubuntu-latest
    outputs:
      system: ${{ steps.matrix.outputs.system }}
      targets: ${{ steps.matrix.outputs.targets }}
    steps:
      - uses: actions/checkout@v4

      - name: Reclaim Disk Space (Nothing but Nix)
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: 'rampage'
          witness-carnage: true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            build-dir = /nix/build
            sandbox = relaxed
            allow-import-from-derivation = true
            trusted-users = runner root
            flake-registry = https://github.com/NixOS/flake-registry/archive/master.tar.gz

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Derive package matrix from flake
        id: matrix
        run: |
          SYSTEM=$(nix eval --raw --impure --expr builtins.currentSystem)
          TARGETS=$(nix eval --json --impure ".#packages.\"$SYSTEM\"" --apply builtins.attrNames || echo "[]")
          if [ "$TARGETS" = "[]" ]; then
            echo "::error::Failed to derive package matrix for $SYSTEM"
            exit 1
          fi
          printf 'system=%s\n' "$SYSTEM" >> "$GITHUB_OUTPUT"
          printf 'targets=%s\n' "$TARGETS" >> "$GITHUB_OUTPUT"
      
      - name: Pre-validate Flake
        run: nix flake check --print-build-logs

  verify-linux:
    name: "Linux: flake check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reclaim Disk Space (Nothing but Nix)
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: 'rampage'
          witness-carnage: true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            build-dir = /nix/build
            sandbox = relaxed
            allow-import-from-derivation = true

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run flake checks
        run: nix flake check --print-build-logs

  build-linux:
    name: "Linux (${{ needs.prepare-linux.outputs.system }}): ${{ matrix.target }}"
    runs-on: ubuntu-latest
    needs: prepare-linux
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.prepare-linux.outputs.targets) }}
    steps:
      - uses: actions/checkout@v4

      - name: Reclaim Disk Space (Nothing but Nix)
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: 'rampage'
          witness-carnage: true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            build-dir = /nix/build
            sandbox = relaxed
            allow-import-from-derivation = true

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build Target
        run: nix build ".#packages.${{ needs.prepare-linux.outputs.system }}.${{ matrix.target }}" --print-build-logs

  prepare-macos-arm64:
    name: Prepare macOS arm64 matrix
    runs-on: macos-26
    outputs:
      system: ${{ steps.matrix.outputs.system }}
      targets: ${{ steps.matrix.outputs.targets }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XCODE_26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_26" ]; then
            echo "::error::Xcode 26 not found on this runner"
            ls /Applications/Xcode*.app || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE_26"
          xcodebuild -version

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            sandbox = relaxed
            allow-import-from-derivation = true
            flake-registry = https://github.com/NixOS/flake-registry/archive/master.tar.gz

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Derive package matrix from flake
        id: matrix
        run: |
          SYSTEM=$(nix eval --raw --impure --expr builtins.currentSystem)
          TARGETS=$(nix eval --json --impure ".#packages.\"$SYSTEM\"" --apply builtins.attrNames || echo "[]")
          if [ "$TARGETS" = "[]" ]; then
            echo "::error::Failed to derive package matrix for $SYSTEM"
            exit 1
          fi
          printf 'system=%s\n' "$SYSTEM" >> "$GITHUB_OUTPUT"
          printf 'targets=%s\n' "$TARGETS" >> "$GITHUB_OUTPUT"

  verify-macos-arm64:
    name: "macOS (arm64): flake check"
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XCODE_26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_26" ]; then exit 1; fi
          sudo xcode-select -s "$XCODE_26"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            sandbox = relaxed
            allow-import-from-derivation = true

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run flake checks
        run: nix flake check --print-build-logs

  build-macos-arm64:
    name: "macOS (${{ needs.prepare-macos-arm64.outputs.system }}): ${{ matrix.target }}"
    runs-on: macos-26
    needs: prepare-macos-arm64
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.prepare-macos-arm64.outputs.targets) }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XCODE_26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_26" ]; then exit 1; fi
          sudo xcode-select -s "$XCODE_26"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            sandbox = relaxed
            allow-import-from-derivation = true

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build Target
        run: nix build ".#packages.${{ needs.prepare-macos-arm64.outputs.system }}.${{ matrix.target }}" --print-build-logs

  prepare-macos-x86_64:
    name: Prepare macOS x86_64 matrix
    runs-on: macos-26
    outputs:
      system: ${{ steps.matrix.outputs.system }}
      targets: ${{ steps.matrix.outputs.targets }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XCODE_26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_26" ]; then exit 1; fi
          sudo xcode-select -s "$XCODE_26"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            sandbox = relaxed
            allow-import-from-derivation = true
            flake-registry = https://github.com/NixOS/flake-registry/archive/master.tar.gz

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Derive package matrix from flake
        id: matrix
        run: |
          TARGETS=$(nix eval --json --impure ".#packages.\"x86_64-darwin\"" --apply builtins.attrNames || echo "[]")
          if [ "$TARGETS" = "[]" ]; then
            echo "::error::Failed to derive package matrix for x86_64-darwin"
            exit 1
          fi
          printf 'system=%s\n' "x86_64-darwin" >> "$GITHUB_OUTPUT"
          printf 'targets=%s\n' "$TARGETS" >> "$GITHUB_OUTPUT"

  build-macos-x86_64:
    name: "macOS (x86_64-darwin): ${{ matrix.target }}"
    runs-on: macos-26
    needs: prepare-macos-x86_64
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.prepare-macos-x86_64.outputs.targets) }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XCODE_26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_26" ]; then exit 1; fi
          sudo xcode-select -s "$XCODE_26"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            sandbox = relaxed
            allow-import-from-derivation = true

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build Target
        run: nix build ".#packages.${{ needs.prepare-macos-x86_64.outputs.system }}.${{ matrix.target }}" --print-build-logs
