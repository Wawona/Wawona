name: Nix CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-linux:
    name: "Linux: ${{ matrix.target }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [
          "wawona-android",
          "wawona-android-backend",
          "gradlegen"
        ]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Reclaim Disk Space (Nothing but Nix)
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: 'rampage'
          witness-carnage: true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            build-dir = /nix/build

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Nix Flake Check
        if: matrix.target == 'wawona-android'
        run: nix flake check

      - name: Build Target
        run: nix build .#${{ matrix.target }} --print-build-logs

  build-macos:
    name: "macOS: ${{ matrix.target }}"
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [
          "wawona-macos",
          "wawona-macos-backend",
          "wawona-ios",
          "wawona-ios-backend",
          "xcodegen",
          "weston",
          "waypipe",
          "wawona-android",
          "wawona-android-backend"
        ]
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build Target
        run: nix build .#${{ matrix.target }} --print-build-logs
