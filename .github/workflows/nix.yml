name: Nix CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-linux:
    name: "Linux: ${{ matrix.target }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [
          "wawona-android",
          "wawona-android-backend",
          "gradlegen",
          "vulkan-cts-android",
          "gl-cts-android"
        ]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Reclaim Disk Space (Nothing but Nix)
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: 'rampage'
          witness-carnage: true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            build-dir = /nix/build

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Nix Flake Check
        if: matrix.target == 'wawona-android'
        run: nix flake check

      - name: Set up KVM permissions
        if: matrix.target == 'wawona-android'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm || true

      - name: Build Target
        run: nix build .#${{ matrix.target }} --print-build-logs

      - name: Run Android SDK Provisioning & Test
        if: matrix.target == 'wawona-android'
        run: nix run .#wawona-android -- --test

  build-macos:
    name: "macOS: ${{ matrix.target }}"
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        target: [
          "wawona-macos",
          "wawona-macos-backend",
          "wawona-ios",
          "wawona-ios-backend",
          "wawona-ios-sim-backend",
          "xcodegen",
          "weston",
          "waypipe",
          "foot",
          "keyboard-test-client",
          "graphics-smoke",
          "graphics-validate",
          "vulkan-cts",
          "gl-cts",
          "wawona-android",
          "wawona-android-backend"
        ]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          # Find the Xcode 26 installation
          XCODE_26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_26" ]; then
            echo "::error::Xcode 26 not found on this runner"
            ls /Applications/Xcode*.app || true
            exit 1
          fi
          echo "Selecting $XCODE_26"
          sudo xcode-select -s "$XCODE_26"
          xcodebuild -version
          xcrun --sdk iphonesimulator --show-sdk-version
          xcrun --sdk macosx --show-sdk-version

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build Target
        run: nix build .#${{ matrix.target }} --print-build-logs

      - name: Run Android SDK Provisioning & Test
        if: matrix.target == 'wawona-android'
        run: nix run .#wawona-android -- --test
