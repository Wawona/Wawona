name: Nix CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux/Android Targets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Reclaim Disk Space (Nothing but Nix)
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: 'rampage'
          witness-carnage: true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            build-dir = /nix/build

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Nix Flake Check
        run: nix flake check

      - name: Build Wawona Android
        run: nix build .#wawona-android --print-build-logs

      - name: Build Wawona Android Backend
        run: nix build .#wawona-android-backend --print-build-logs

      - name: Build Gradle Generator
        run: nix build .#gradlegen --print-build-logs

  build-macos:
    name: Build macOS/iOS Targets
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build Wawona macOS
        run: nix build .#wawona-macos --print-build-logs

      - name: Build Wawona iOS
        run: nix build .#wawona-ios --print-build-logs

      - name: Build Wawona Android
        run: nix build .#wawona-android --print-build-logs

      - name: Build Xcode Project Generator
        run: nix build .#xcodegen --print-build-logs

      - name: Build Weston
        run: nix build .#weston --print-build-logs
